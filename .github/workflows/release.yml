name: Release

on:
  push:
    branches:
      - main
    paths:
      - '.claude/**'
      - '.autolink/**'
      - '.husky/**'
      - 'scripts/**'
      - 'docs/templates.md'
      - 'CLAUDE.md'
      - 'commitlint.config.js'
      - 'package.json'
      - 'release-please-config.json'
      - '.release-please-manifest.json'

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple
      - name: Request review
        if: steps.release.outputs.pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit ${{ fromJSON(steps.release.outputs.pr).number }} --repo ${{ github.repository }} --add-reviewer michaeljauk
